<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Media Player - XP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tahoma","Microsoft Sans Serif","宋体",sans-serif;font-size:12px}
body{background:#1464A6;padding:20px 0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.xp-wmp-container{width:580px;background:#ECE9D8;border:6px solid #94A6CE;border-radius:3px;box-shadow:0 0 10px rgba(0,0,0,0.3);overflow:hidden}
.xp-title-bar{background:linear-gradient(to bottom,#0A58C5,#3293F9);height:24px;padding:0 8px;display:flex;align-items:center;color:#FFF;font-weight:bold;user-select:none}
.title-text{display:flex;align-items:center;gap:6px}
.title-icon{width:16px;height:16px;background:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiIgZmlsbD0id2hpdGUiPjxwYXRoIGQ9Ik0yIDN2MTBoMTJWM0gyem0xIDFoMTB2OEgzVjR6bTQgM2wxIDF2M2wtMSAxSDZsLTFtMi00djQiLz48L3N2Zz4=') no-repeat center}
.xp-menu-bar{background:#ECE9D8;border-bottom:1px solid #ACA899;padding:2px 6px;display:flex;gap:12px}
.xp-menu-bar span{padding:2px 5px;cursor:pointer}
.xp-menu-bar span:hover{background:#316AC5;color:#FFF}
.video-section{position:relative;background:#000;border:2px inset #FFF;margin:6px;height:280px}
video{width:100%;height:100%;display:block;object-fit:contain}
.loading-tip{position:absolute;inset:0;background:rgba(0,0,0,0.8);color:#FFF;display:grid;place-items:center;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s ease}
.loading-tip.show{opacity:1}
.playlist-section{background:#FFF;border:1px solid #7F9DB9;margin:0 6px 6px;padding:3px;height:80px;overflow-y:auto}
.playlist-item{padding:2px 5px;cursor:pointer;border-radius:2px}
.playlist-item:hover{background:#316AC5;color:#FFF}
.playlist-item.active{background:#316AC5;color:#FFF}
.controls-section{background:linear-gradient(to bottom,#ECE9D8,#DFDFD1);border-top:1px solid #FFF;padding:6px 8px;display:flex;flex-direction:column;gap:6px}
.progress-wrap{width:100%;height:12px;background:#FFF;border:1px solid #7F9DB9;cursor:pointer}
.progress-bar{height:100%;background:linear-gradient(to right,#3A85FF,#5A9CFF);width:0%;transition:width 0.1s linear}
.controls-row{display:flex;align-items:center;justify-content:space-between}
.xp-btn{background:linear-gradient(to bottom,#E6E6E6,#CCC);border:1px solid #666;box-shadow:inset 1px 1px 0 #FFF,inset -1px -1px 0 #888;padding:2px 6px;cursor:pointer;border-radius:2px;min-width:42px;text-align:center;font-size:11px}
.xp-btn:active{box-shadow:inset 1px 1px 0 #888,inset -1px -1px 0 #FFF;background:linear-gradient(to bottom,#CCC,#E6E6E6)}
.time-display{color:#000;min-width:100px;text-align:center;font-size:11px}
.volume-wrap{display:flex;align-items:center;gap:5px}
.volume-wrap span{color:#000;font-size:11px}
#volume-slider{width:80px;accent-color:#3A85FF;height:10px}
#fullscreenBtn{min-width:50px}
</style>
</head>
<body>

<div class="xp-wmp-container">
  <div class="xp-title-bar">
    <div class="title-text">
      <div class="title-icon"></div>Windows Media Player
    </div>
  </div>

  <div class="xp-menu-bar">
    <span>文件(F)</span><span>查看(V)</span><span>播放(P)</span><span>工具(T)</span><span>帮助(H)</span>
  </div>

  <div class="video-section">
    <video id="videoPlayer" muted></video>
    <div class="loading-tip" id="loadingTip">正在加载...</div>
  </div>

  <div class="playlist-section" id="playlistWrap">
    <div class="playlist-item" data-url="https://channel.wcrmt.cn/nmip-media/channellive/channel105268/playlist.m3u8">旺苍新闻综合</div>
    <div class="playlist-item" data-url="https://live.shaoxing.com.cn/video/s10001-sxtv2/index.m3u8">绍兴公共</div>
    <div class="playlist-item" data-url="https://qcfile.qcrmt.com/nmip-media/channellive/channel100933/playlist.m3u8">青川综合</div>
    <div class="playlist-item" data-url="https://www.w3school.com.cn/i/movie.mp4">测试MP4视频</div>
  </div>

  <div class="controls-section">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="controls-row">
      <div>
        <button class="xp-btn" id="playBtn">播放</button>
        <button class="xp-btn" id="pauseBtn">暂停</button>
        <button class="xp-btn" id="stopBtn">停止</button>
      </div>
      <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
      <div class="volume-wrap">
        <span>音量:</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
        <button class="xp-btn" id="fullscreenBtn">全屏</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.14/dist/hls.min.js"></script>
<script>
const video = document.getElementById('videoPlayer');
const loadingTip = document.getElementById('loadingTip');
const progressBar = document.getElementById('progressBar');
const progressWrap = document.getElementById('progressWrap');
const volumeSlider = document.getElementById('volume-slider');
const timeDisplay = document.getElementById('timeDisplay');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const playlistItems = document.querySelectorAll('.playlist-item');

let hls = null;
let currentUrl = '';
video.volume = volumeSlider.value;

function showLoading(flag) {
  loadingTip.classList.toggle('show', flag);
}

function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
  const min = Math.floor(seconds / 60).toString().padStart(2, '0');
  const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
  return `${min}:${sec}`;
}

function updateTime() {
  const current = formatTime(video.currentTime);
  const total = formatTime(video.duration);
  timeDisplay.textContent = `${current} / ${total}`;
}

function updateProgress() {
  if (!video.duration || !isFinite(video.duration)) {
    progressBar.style.width = '0%';
    return;
  }
  const percent = (video.currentTime / video.duration) * 100;
  progressBar.style.width = `${percent}%`;
}

function changeVideoSource(url) {
  if (!url || url === currentUrl) return;
  currentUrl = url;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  video.pause();
  video.src = '';
  showLoading(true);

  playlistItems.forEach(item => {
    item.classList.remove('active');
    if (item.dataset.url === url) item.classList.add('active');
  });

  try {
    if (url.includes('.m3u8')) {
      if (!Hls.isSupported()) {
        alert('当前浏览器不支持m3u8直播');
        showLoading(false);
        return;
      }
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(err => {
          console.warn('自动播放被限制，点击播放即可');
        });
        showLoading(false);
      });

      hls.on(Hls.Events.ERROR, (evt, data) => {
        if (data.fatal) {
          alert('直播源失效或无法播放');
          showLoading(false);
        }
      });

    } else {
      video.src = url;
      video.play().catch(err => {
        console.warn('自动播放被限制，点击播放即可');
      });
      showLoading(false);
    }
  } catch (e) {
    console.error(e);
    alert('播放失败');
    showLoading(false);
  }
}

progressWrap.addEventListener('click', e => {
  if (!video.duration || !isFinite(video.duration)) return;
  const rect = progressWrap.getBoundingClientRect();
  const pos = (e.clientX - rect.left) / rect.width;
  video.currentTime = pos * video.duration;
});

volumeSlider.addEventListener('input', () => {
  video.volume = volumeSlider.value;
  video.muted = false;
});

playBtn.addEventListener('click', () => {
  if (!video.src) {
    changeVideoSource(playlistItems[0].dataset.url);
    return;
  }
  video.muted = false;
  video.play().catch(console.warn);
});

pauseBtn.addEventListener('click', () => {
  video.pause();
});

stopBtn.addEventListener('click', () => {
  video.pause();
  video.currentTime = 0;
  progressBar.style.width = '0%';
  updateTime();
});

fullscreenBtn.addEventListener('click', () => {
  const el = document.querySelector('.xp-wmp-container');
  if (!document.fullscreenElement) {
    el.requestFullscreen().catch(console.warn);
  } else {
    document.exitFullscreen();
  }
});

playlistItems.forEach(item => {
  item.addEventListener('click', () => {
    changeVideoSource(item.dataset.url);
  });
});

video.addEventListener('timeupdate', () => {
  updateProgress();
  updateTime();
});

video.addEventListener('loadedmetadata', updateTime);

window.addEventListener('DOMContentLoaded', () => {
  changeVideoSource(playlistItems[0].dataset.url);
});
</script>
</body>
</html>
