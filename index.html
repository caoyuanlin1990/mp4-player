<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 多源视频播放器</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #1464A6;
  font-family: "Microsoft Sans Serif", "宋体", sans-serif;
  font-size: 12px;
  color: #000;
  padding: 30px 0;
}
.player-main {
  max-width: 700px;
  margin: 0 auto;
  background: #ECE9D8;
  border: 6px solid #94A6CE;
  border-radius: 4px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  overflow: hidden;
}
.xp-title-bar {
  background: linear-gradient(to bottom, #0A58C5, #3293F9);
  height: 26px;
  padding: 0 10px;
  display: flex;
  align-items: center;
  color: #FFF;
  font-weight: bold;
}
.video-section {
  position: relative;
  background: #000;
  border: 2px inset #FFF;
  margin: 8px;
}
video {
  width: 100%;
  display: block;
}
#fullscreenBtn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: linear-gradient(to bottom, #E6E6E6, #CCC);
  border: 1px solid #666;
  box-shadow: inset 1px 1px 0 #FFF, inset -1px -1px 0 #888;
  padding: 2px 6px;
  font-size: 11px;
  cursor: pointer;
}
.loading-tip {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  color: #FFF;
  display: grid;
  place-items: center;
  opacity: 0;
  pointer-events: none;
}
.loading-tip.show { opacity: 1; }
.control-section {
  padding: 10px;
}
#playlist {
  width: 100%;
  padding: 3px 4px;
  border: 1px solid #7F9DB9;
  background: #FFF;
  font-size: 12px;
  margin-bottom: 10px;
}
.progress-wrap {
  width: 100%;
  height: 12px;
  background: #FFF;
  border: 1px solid #7F9DB9;
  cursor: pointer;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(to right, #3A85FF, #5A9CFF);
  width: 0%;
}
.volume-control {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 12px;
}
#volume-slider {
  flex: 1;
  accent-color: #3A85FF;
}
</style>
</head>
<body>

<div class="player-main">
  <div class="xp-title-bar">
    🎬 多源视频播放器
  </div>

  <div class="video-section">
    <video id="videoPlayer" controls></video>
    <button id="fullscreenBtn">全屏</button>
    <div class="loading-tip" id="loadingTip">加载中...</div>
  </div>

  <div class="control-section">
    <select id="playlist"></select>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="volume-control">
      <span>音量:</span>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<script>
  const video = document.getElementById('videoPlayer');
  const loadingTip = document.getElementById('loadingTip');
  const playlist = document.getElementById('playlist');
  const progressBar = document.getElementById('progressBar');
  const progressWrap = document.getElementById('progressWrap');
  const volumeSlider = document.getElementById('volume-slider');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  let hls = null;

  const videoSources = [
    { name: "旺苍新闻综合", url: "https://channel.wcrmt.cn/nmip-media/channellive/channel105268/playlist.m3u8" },
    { name: "绍兴公共", url: "https://live.shaoxing.com.cn/video/s10001-sxtv2/index.m3u8" },
    { name: "青川综合", url: "https://qcfile.qcrmt.com/nmip-media/channellive/channel100933/playlist.m3u8" },
    { name: "测试MP4", url: "https://ru.xiaohe1999.dpdns.org/raw/VID_20260409_222058_709.mp4" },
  ];

  function renderSourceList() {
    playlist.innerHTML = '';
    videoSources.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.url;
      opt.textContent = item.name;
      playlist.appendChild(opt);
    });
    const last = localStorage.getItem('lastVideoSource');
    if (last) playlist.value = last;
  }

  function showLoading(flag) {
    loadingTip.classList.toggle('show', flag);
  }

  async function changeVideoSource(url) {
    if (!url) return;
    localStorage.setItem('lastVideoSource', url);
    showLoading(true);

    if (hls) { hls.destroy(); hls = null; }
    video.pause(); video.src = '';

    try {
      if (url.includes('.m3u8')) {
        if (!Hls.isSupported()) { alert('浏览器不支持m3u8'); showLoading(false); return; }
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(console.warn);
          showLoading(false);
        });
        hls.on(Hls.Events.ERROR, () => { alert('视频加载失败'); showLoading(false); });
      } else {
        video.src = url;
        await video.play().catch(console.warn);
        showLoading(false);
      }
    } catch (e) {
      alert('播放失败，请手动点击');
      showLoading(false);
    }
  }

  function toggleFullScreen() {
    const el = document.querySelector('.player-main');
    if (!document.fullscreenElement) el.requestFullscreen();
    else document.exitFullscreen();
  }

  fullscreenBtn.addEventListener('click', toggleFullScreen);

  video.addEventListener('timeupdate', () => {
    if (!video.duration) return;
    progressBar.style.width = (video.currentTime / video.duration * 100) + '%';
  });

  progressWrap.addEventListener('click', e => {
    const p = e.offsetX / progressWrap.offsetWidth;
    video.currentTime = p * video.duration;
  });

  volumeSlider.addEventListener('input', () => {
    video.volume = volumeSlider.value;
  });

  window.addEventListener('DOMContentLoaded', () => {
    renderSourceList();
    changeVideoSource(playlist.value);
    playlist.addEventListener('change', () => {
      changeVideoSource(playlist.value);
    });
  });
</script>
</body>
</html>
