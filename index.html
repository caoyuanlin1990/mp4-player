<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多源在线视频播放器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Tahoma","Microsoft Sans Serif","宋体",sans-serif;font-size:12px}
body{background:#1464A6;padding:20px 0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.xp-wmp-container{width:580px;background:#ECE9D8;border:6px solid #94A6CE;border-radius:3px;box-shadow:0 0 10px rgba(0,0,0,0.3);overflow:hidden}
.xp-title-bar{background:linear-gradient(to bottom,#0A58C5,#3293F9);height:24px;padding:0 8px;display:flex;align-items:center;color:#FFF;font-weight:bold;user-select:none}
.title-text{display:flex;align-items:center;gap:6px}
.title-icon{width:16px;height:16px;background:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiIgZmlsbD0id2hpdGUiPjxwYXRoIGQ9Ik0yIDN2MTBoMTJWM0gyem0xIDFoMTB2OEgzVjR6bTQgM2wxIDF2M2wtMSAxSDZsLTFtMi00djQiLz48L3N2Zz4=') no-repeat center center}
.xp-menu-bar{background:#ECE9D8;border-bottom:1px solid #ACA899;padding:2px 6px;display:flex;gap:12px}
.xp-menu-bar span{padding:2px 5px;cursor:pointer}
.xp-menu-bar span:hover{background:#316AC5;color:#FFF}
.video-section{position:relative;background:#000;border:2px inset #FFF;margin:6px;height:280px}
video{width:100%;height:100%;display:block;object-fit:contain}
.loading-tip{position:absolute;inset:0;background:rgba(0,0,0,0.8);color:#FFF;display:grid;place-items:center;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s ease}
.loading-tip.show{opacity:1}
.playlist-section{background:#FFF;border:1px solid #7F9DB9;margin:0 6px 6px;padding:3px;height:110px;overflow-y:auto}
.playlist-item{padding:2px 5px;cursor:pointer;border-radius:2px}
.playlist-item:hover{background:#316AC5;color:#FFF}
.playlist-item.active{background:#316AC5;color:#FFF}
.controls-section{background:linear-gradient(to bottom,#ECE9D8,#DFDFD1);border-top:1px solid #FFF;padding:6px 8px;display:flex;flex-direction:column;gap:6px}
.progress-wrap{width:100%;height:12px;background:#FFF;border:1px solid #7F9DB9;cursor:pointer}
.progress-bar{height:100%;background:linear-gradient(to right,#3A85FF,#5A9CFF);width:0%;transition:width 0.1s linear}
.controls-row{display:flex;align-items:center;justify-content:space-between}
.xp-btn{background:linear-gradient(to bottom,#E6E6E6,#CCC);border:1px solid #666;box-shadow:inset 1px 1px 0 #FFF,inset -1px -1px 0 #888;padding:2px 6px;cursor:pointer;border-radius:2px;min-width:42px;text-align:center;font-size:11px}
.xp-btn:active{box-shadow:inset 1px 1px 0 #888,inset -1px -1px 0 #FFF;background:linear-gradient(to bottom,#CCC,#E6E6E6)}
.time-display{color:#000;min-width:100px;text-align:center;font-size:11px}
.volume-wrap{display:flex;align-items:center;gap:5px}
.volume-wrap span{color:#000;font-size:11px}
#volume-slider{width:80px;accent-color:#3A85FF;height:10px;-webkit-appearance:none}
#volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#3A85FF;border-radius:2px}
@media (max-width:600px){
  .xp-wmp-container{width:95%}
  .video-section{height:200px}
  .controls-row{flex-wrap:wrap;gap:6px;justify-content:center}
  .volume-wrap{margin-top:6px}
}
:fullscreen .xp-wmp-container{width:100%!important;height:100%!important;display:flex;flex-direction:column}
:fullscreen .video-section{flex:1;height:auto!important}
:-webkit-full-screen .xp-wmp-container{width:100%!important;height:100%!important;display:flex;flex-direction:column}
:-webkit-full-screen .video-section{flex:1;height:auto!important}
</style>
</head>
<body>
<div class="xp-wmp-container">
  <div class="xp-title-bar">
    <div class="title-text">
      <div class="title-icon"></div>多源在线视频播放器
    </div>
  </div>
  <div class="xp-menu-bar">
    <span>文件(F)</span><span>查看(V)</span><span>播放(P)</span><span>工具(T)</span><span>帮助(H)</span>
  </div>
  <div class="video-section">
    <video id="videoPlayer" playsinline></video>
    <div class="loading-tip" id="loadingTip">加载播放列表...</div>
  </div>
  <div class="playlist-section" id="playlistWrap"></div>
  <div class="controls-section">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="controls-row">
      <div>
        <button class="xp-btn" id="playBtn">播放</button>
        <button class="xp-btn" id="pauseBtn">暂停</button>
        <button class="xp-btn" id="stopBtn">停止</button>
      </div>
      <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
      <div class="volume-wrap">
        <span>音量:</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
        <button class="xp-btn" id="fullscreenBtn">全屏</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script>
const video = document.getElementById('videoPlayer');
const loadingTip = document.getElementById('loadingTip');
const progressBar = document.getElementById('progressBar');
const progressWrap = document.getElementById('progressWrap');
const volumeSlider = document.getElementById('volume-slider');
const timeDisplay = document.getElementById('timeDisplay');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const playlistWrap = document.getElementById('playlistWrap');

let hls = null;
let currentUrl = '';
let playlistConfig = [];
let refreshTimer = null;

const PLAYLIST_API = 'https://ghproxy.net/https://raw.githubusercontent.com/caoyuanlin1990/mp4-player/main/playlist.json';
const REFRESH_INTERVAL = 3 * 60 * 1000;

video.volume = 1.0;
volumeSlider.value = 1.0;
video.muted = false;

function showLoading(flag) {
  loadingTip.classList.toggle('show', !!flag);
}
function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = Math.floor(seconds % 60).toString().padStart(2, '0');
  return m + ":" + s;
}
function updateTime() {
  const current = formatTime(video.currentTime);
  const total = (video.duration && isFinite(video.duration)) ? formatTime(video.duration) : "直播";
  timeDisplay.textContent = current + " / " + total;
}
function updateProgress() {
  if (!video.duration || !isFinite(video.duration)) {
    progressBar.style.width = '0%';
    return;
  }
  const p = (video.currentTime / video.duration) * 100;
  progressBar.style.width = p + '%';
}
function destroyHLS() {
  if (hls && typeof hls.destroy === 'function') {
    hls.destroy();
    hls = null;
  }
}
function safePlay() {
  try {
    video.muted = false;
    const promise = video.play();
    if (promise) promise.catch(err => {
      console.warn('自动播放被限制，请点击播放');
      showLoading(false);
    });
  } catch (e) {}
}

// 🔥 修复：刷新必显示、保留选中、事件必生效
function renderPlaylist() {
  if (!playlistConfig || playlistConfig.length === 0) return;
  playlistWrap.innerHTML = '';
  playlistConfig.forEach(item => {
    const div = document.createElement('div');
    div.className = 'playlist-item';
    div.dataset.url = item.url;
    div.textContent = item.name;
    if (item.url === currentUrl) {
      div.classList.add('active');
    }
    playlistWrap.appendChild(div);
  });
  bindPlaylistEvents();
}

// 🔥 修复：统一绑定事件，刷新不丢失
function bindPlaylistEvents() {
  document.querySelectorAll('.playlist-item').forEach(el => {
    el.onclick = () => {
      changeVideoSource(el.dataset.url);
    };
  });
}

// 🔥 修复：切换源逻辑稳定，不崩溃
function changeVideoSource(url) {
  if (!url || url === currentUrl) return;
  destroyHLS();
  video.pause();
  video.src = '';
  currentUrl = url;
  showLoading(true);

  document.querySelectorAll('.playlist-item').forEach(item => {
    item.classList.remove('active');
    if (item.dataset.url === url) item.classList.add('active');
  });

  try {
    if (url.includes('.m3u8')) {
      if (!window.Hls || !Hls.isSupported()) {
        alert('浏览器不支持直播');
        showLoading(false);
        return;
      }
      hls = new Hls({ enableWorker: true, lowLatencyMode: true });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.muted = false;
        safePlay();
        showLoading(false);
      });
      hls.on(Hls.Events.ERROR, (evt, data) => {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
          else {
            alert('直播源失效');
            showLoading(false);
            destroyHLS();
          }
        }
      });
    } else {
      video.src = url;
      video.muted = false;
      safePlay();
      showLoading(false);
    }
  } catch (e) {
    console.error(e);
    alert('播放失败');
    showLoading(false);
  }
}

// 🔥 修复：加载列表防卡死、刷新必显示
async function loadPlaylistFromJson() {
  showLoading(true);
  try {
    const res = await fetch(PLAYLIST_API + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    if (Array.isArray(data)) {
      playlistConfig = data;
      renderPlaylist();
      console.log('✅ 列表刷新成功');
    }
  } catch (err) {
    console.error('❌ 列表刷新失败', err);
  } finally {
    showLoading(false);
  }
}

// 🔥 修复：自动刷新稳定不崩溃
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadPlaylistFromJson, REFRESH_INTERVAL);
}

// 进度条
progressWrap.addEventListener('click', e => {
  if (!video.duration || !isFinite(video.duration)) return;
  const r = progressWrap.getBoundingClientRect();
  const pos = (e.clientX - r.left) / r.width;
  video.currentTime = pos * video.duration;
});

// 音量
volumeSlider.addEventListener('input', () => {
  video.volume = volumeSlider.value;
  video.muted = false;
});

// 播放控制
playBtn.addEventListener('click', () => {
  if ((!video.src && !hls) && playlistConfig.length > 0) {
    changeVideoSource(playlistConfig[0].url);
    return;
  }
  video.muted = false;
  safePlay();
});
pauseBtn.addEventListener('click', () => video.pause());
stopBtn.addEventListener('click', () => {
  video.pause();
  video.currentTime = 0;
  progressBar.style.width = '0%';
  updateTime();
});

// 全屏
fullscreenBtn.addEventListener('click', () => {
  const el = document.querySelector('.xp-wmp-container');
  const fe = document.fullscreenElement || document.webkitFullscreenElement;
  if (!fe) {
    el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
});

// 视频事件
video.addEventListener('timeupdate', () => { updateProgress(); updateTime(); });
video.addEventListener('loadedmetadata', updateTime);
video.addEventListener('loadeddata', () => showLoading(false));

// 页面关闭清理
window.addEventListener('beforeunload', () => {
  destroyHLS();
  if (refreshTimer) clearInterval(refreshTimer);
});

// 初始化
window.addEventListener('DOMContentLoaded', async () => {
  await loadPlaylistFromJson();
  if (playlistConfig.length > 0) {
    changeVideoSource(playlistConfig[0].url);
  }
  startAutoRefresh();
});
</script>
</body>
</html>
