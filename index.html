<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统维护公告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;display:flex;align-items:center;justify-content:center;padding:0 20px}
.container{max-width:600px;width:100%;background:#fff;padding:60px 40px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.06);text-align:center}

/* 电脑主机/设备图标 */
.device-icon{width:84px;height:84px;margin:0 auto 36px;position:relative}
.pc-case{width:70px;height:80px;border:3px solid #1a73e8;border-radius:8px;position:absolute;left:50%;transform:translateX(-50%)}
.pc-screen{width:60px;height:44px;background:#e8f0fe;position:absolute;top:8px;left:50%;transform:translateX(-50%);border-radius:4px}
.pc-light{width:6px;height:6px;background:#1a73e8;border-radius:50%;position:absolute;bottom:12px;right:12px;animation:blink 1.8s infinite alternate}
@keyframes blink{0%{opacity:.3}100%{opacity:1}}

h1{font-size:28px;font-weight:500;color:#222;margin-bottom:20px}
.desc{font-size:16px;color:#5f6368;line-height:1.8;margin-bottom:8px}
.divider{width:50px;height:1px;background:#e0e0e0;margin:30px auto}
.footer{font-size:14px;color:#888}
</style>
</head>
<body>

<div class="container">
  <div class="device-icon">
    <div class="pc-case"></div>
    <div class="pc-screen"></div>
    <div class="pc-light"></div>
  </div>

  <h1>系统维护公告</h1>
  <p class="desc">为提升服务质量与系统稳定性，平台当前正在进行例行维护升级。</p>
  <p class="desc">维护期间服务暂时不可用，完成后将自动恢复访问。</p>

  <div class="divider"></div>
  <div class="footer">感谢您的理解与耐心等待</div>
</div>

</body>
</html>
