<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专用MP4播放器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;padding:20px;font-family:sans-serif}
.container{max-width:900px;margin:0 auto}
.title{text-align:center;margin-bottom:20px}
.video-box{width:100%;background:#000;border-radius:8px;overflow:hidden}
video{width:100%;display:block}
</style>
</head>
<body>
<div class="container">
  <h3 class="title">MP4 播放</h3>
  <div class="video-box">
    <video id="player" controls></video>
  </div>
</div>

<script>
const vid = document.getElementById('player');
const url = 'https://ru.xiaohe1999.dpdns.org/raw/5_6154278803309863868.mp4';
vid.src = url;
vid.onerror = ()=>alert('仍解析失败：文件/服务器异常');
</script>
</body>
</html>
