<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频播放</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }
  body{
    background:#121212;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .container{
    width:100%;
    max-width:1000px;
  }
  .video-card{
    background:#1e1e1e;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
  }
  .video-header{
    padding:16px 20px;
    color:#fff;
    font-size:18px;
    font-weight:500;
    border-bottom:1px solid #333;
  }
  video{
    width:100%;
    display:block;
    outline:none;
  }
  .video-footer{
    padding:14px 20px;
    color:#aaa;
    font-size:14px;
    text-align:center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="video-card">
    <div class="video-header">高清视频播放</div>
    <video id="v" controls crossorigin="anonymous"></video>
    <div class="video-footer">加载中… 若无法播放请检查网络或视频地址</div>
  </div>
</div>

<script>
const video = document.getElementById('v');
const url = 'https://ru.xiaohe1999.dpdns.org/raw/5_6154278803309863868.mp4;

video.src = url;

video.addEventListener('error', async () => {
  try {
    const res = await fetch(url, { mode: 'cors' });
    const blob = await res.blob();
    video.src = URL.createObjectURL(blob);
    video.load();
  } catch (err) {
    alert('视频加载失败：跨域限制或服务器不可用');
  }
});
</script>

</body>
</html>
