<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>多源在线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
html,body{height:100%;background:#111}
body{display:flex;justify-content:center;align-items:center;padding:8px}

.player{
  width:100%;height:100%;max-width:1100px;
  background:#1a1a1a;border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
  overflow:hidden;display:flex;flex-direction:column;
  position:relative;
}

.video-box{
  position:relative;flex:1;min-height:200px;background:#000;
  cursor:pointer;
}
video{width:100%;height:100%;object-fit:contain;background:#000}
.loading{
  position:absolute;inset:0;background:rgba(0,0,0,0.8);color:#fff;
  display:grid;place-items:center;font-size:15px;opacity:0;pointer-events:none;transition:.2s
}
.loading.show{opacity:1}

/* 🔥 深色透明毛玻璃播放列表 */
.playlist-float{
  position:absolute;
  top:12px;right:12px;
  width:260px;
  max-height:400px;
  background:rgba(20, 20, 20, 0.35);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  overflow:hidden;z-index:10;
  transition:all 0.3s ease;
  opacity:0;
  transform:translateY(-10px);
  pointer-events:none;
}
.playlist-float.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}
.playlist-float.collapsed .pl-body{
  display:none;
}
.pl-head{
  padding:10px 14px;
  background:rgba(0, 119, 255, 0.35);
  backdrop-filter:blur(12px);
  color:#fff;font-size:14px;font-weight:500;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;
}
.pl-toggle{font-size:12px}
.pl-body{
  padding:8px;max-height:340px;overflow-y:auto;
}
.pl-item{
  padding:8px 12px;border-radius:8px;font-size:13px;
  color:#e0e0e0;cursor:pointer;margin-bottom:4px;transition:.15s;
  background:rgba(255,255,255,0.05);
}
.pl-item:hover{background:rgba(255,255,255,0.12)}
.pl-item.active{background:rgba(0, 119, 255, 0.4);color:#fff}

.controls{
  padding:14px;display:flex;flex-direction:column;gap:10px;
  background:#1a1a1a;border-top:1px solid #333
}
.progress{width:100%;height:6px;background:#333;border-radius:99px;cursor:pointer;overflow:hidden}
.progress .bar{height:100%;background:#0077ff;width:0%;transition:width .1s linear}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.btn{padding:7px 12px;background:#2a2a2a;color:#0090ff;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:.15s}
.btn:hover{background:#333}
.time{font-size:14px;color:#aaa;min-width:110px;text-align:center}
.volume{display:flex;align-items:center;gap:6px}
.volume span{font-size:14px;color:#aaa}
#vol{width:85px;accent-color:#0077ff}

:fullscreen .player{width:100%!important;height:100%!important;border-radius:0;background:#000}
:-webkit-full-screen .player{width:100%!important;height:100%!important;border-radius:0;background:#000}
</style>
</head>

<body>
<div class="player">
  <div class="video-box" id="videoArea">
    <video id="video" playsinline></video>
    <div class="loading" id="loading">加载中...</div>
  </div>

  <!-- 深色透明浮动列表 -->
  <div class="playlist-float" id="floatList">
    <div class="pl-head" id="plHead">
      <span>播放列表</span>
      <span class="pl-toggle" id="plToggle">−</span>
    </div>
    <div class="pl-body" id="plBody"></div>
  </div>

  <div class="controls">
    <div class="progress" id="progressWrap"><div class="bar" id="progress"></div></div>
    <div class="ctrl-row">
      <div><button class="btn" id="play">播放</button><button class="btn" id="pause">暂停</button><button class="btn" id="stop">停止</button></div>
      <div class="time" id="time">00:00 / 00:00</div>
      <div class="volume"><span>音量</span><input type="range" id="vol" min="0" max="1" step="0.05" value="1"></div>
      <button class="btn" id="full">全屏</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script>
const video = document.getElementById('video');
const videoArea = document.getElementById('videoArea');
const loading = document.getElementById('loading');
const progress = document.getElementById('progress');
const progressWrap = document.getElementById('progressWrap');
const vol = document.getElementById('vol');
const timeTxt = document.getElementById('time');
const plBody = document.getElementById('plBody');
const floatList = document.getElementById('floatList');
const plHead = document.getElementById('plHead');
const plToggle = document.getElementById('plToggle');

let hls = null;
let currentUrl = '';
let hideTimer = null;
const API = 'https://ghproxy.net/https://raw.githubusercontent.com/caoyuanlin1990/mp4-player/main/playlist.json';

video.volume = 1;

// 点击显示，自动隐藏
function showPlaylist() {
  floatList.classList.add('show');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => floatList.classList.remove('show'), 3000);
}
videoArea.addEventListener('click', showPlaylist);
floatList.addEventListener('mouseenter', () => clearTimeout(hideTimer));
floatList.addEventListener('mouseleave', () => {
  hideTimer = setTimeout(() => floatList.classList.remove('show'), 1000);
});

// 收起展开
plHead.onclick = (e) => {
  e.stopPropagation();
  floatList.classList.toggle('collapsed');
  plToggle.textContent = floatList.classList.contains('collapsed') ? '+' : '−';
};

function showLoading(f){loading.classList.toggle('show',!!f)}
function fmt(t){if(isNaN(t))return'00:00';const m=Math.floor(t/60).toString().padStart(2,'0');const s=Math.floor(t%60).toString().padStart(2,'0');return m+':'+s}
function updateTime(){timeTxt.textContent=`${fmt(video.currentTime)} / ${fmt(video.duration)}`}
function updateProgress(){if(!video.duration)return;progress.style.width=(video.currentTime/video.duration*100)+'%'}
function destroyHLS(){try{if(hls)hls.destroy()}catch(e){}hls=null}
function playVideo(){try{video.muted=false;const p=video.play();if(p)p.catch(()=>{});showPlaylist()}catch(e){}}

function renderList(list){
  if(!list?.length)return;plBody.innerHTML='';
  list.forEach(item=>{
    const div=document.createElement('div');div.className='pl-item';
    div.dataset.url=item.url;div.textContent=item.name;
    div.onclick=()=>{loadSource(item.url);showPlaylist()};
    if(item.url===currentUrl)div.classList.add('active');
    plBody.appendChild(div);
  });
}

function loadSource(url){
  if(!url||url===currentUrl)return;destroyHLS();video.pause();video.src='';video.load();currentUrl=url;showLoading(true);
  document.querySelectorAll('.pl-item').forEach(i=>i.classList.remove('active'));
  document.querySelector(`.pl-item[data-url="${url}"]`)?.classList.add('active');
  try{
    if(url.includes('.m3u8')){
      if(!Hls.isSupported()){alert('不支持直播');showLoading(false);return}
      hls=new Hls({lowLatencyMode:true});hls.loadSource(url);hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>{playVideo();showLoading(false)});
      hls.on(Hls.Events.ERROR,()=>{hls.startLoad()});
    }else{video.src=url;playVideo();showLoading(false)}
  }catch(e){alert('播放失败');showLoading(false)}
}

async function loadPlaylist(){
  showLoading(true);try{const res=await fetch(API+'?t='+Date.now(),{cache:'no-store'});const data=await res.json();renderList(data);if(data.length)loadSource(data[0].url);}catch(e){}finally{showLoading(false)}
}

progressWrap.onclick=(e)=>{if(!video.duration)return;const r=progressWrap.getBoundingClientRect();video.currentTime=((e.clientX-r.left)/r.width)*video.duration};
vol.oninput=()=>{video.volume=vol.value};
document.getElementById('play').onclick=()=>{if(!currentUrl)loadPlaylist();else playVideo()};
document.getElementById('pause').onclick=()=>video.pause();
document.getElementById('stop').onclick=()=>{video.pause();video.currentTime=0;updateProgress()};
document.getElementById('full').onclick=()=>{
  const el=document.querySelector('.player');const fe=document.fullscreenElement||document.webkitFullscreenElement;
  fe?(document.exitFullscreen?.()||document.webkitExitFullscreen?.()):(el.requestFullscreen?.()||el.webkitRequestFullscreen?.());
};

video.ontimeupdate=()=>{updateProgress();updateTime()};
video.onloadeddata=()=>showLoading(false);
window.onload=loadPlaylist;
</script>
</body>
</html>
