<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频播放</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;padding:20px}
  .video-wrap{max-width:1000px;margin:0 auto}
  video{width:100%;display:block;border-radius:8px}
</style>
</head>
<body>
<div class="video-wrap">
  <video id="v" controls></video>
</div>

<script>
const video = document.getElementById('v');
// 加时间戳强制不使用缓存
const url = 'https://ru.xiaohe1999.dpdns.org/raw/5_6154278803309863868.mp4'
+'?t='+new Date().getTime();

// 尝试直接播放
video.src = url;

// 失败后再用跨域兼容方式
video.onerror = async () => {
  try {
    const res = await fetch(url, { mode: "cors" });
    const blob = await res.blob();
    video.src = URL.createObjectURL(blob);
  } catch (e) {
    alert("视频无法播放：服务器限制或跨域拦截");
  }
};
</script>
</body>
</html>
